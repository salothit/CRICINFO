<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricHeroes Admin — Ball by Ball Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1a;--bg2:#0f1628;--bg3:#141d35;--bg4:#1a2540;
  --accent:#00d4ff;--accent2:#ff6b35;--accent3:#00ff88;--accent4:#ffd700;
  --text:#e8f0ff;--text2:#8fa3cc;--text3:#4a6080;
  --red:#ff4455;--green:#00cc66;--yellow:#ffcc00;--purple:#9966ff;
  --border:#1e2d4a;--border2:#243350;
  --font-head:'Rajdhani',sans-serif;
  --font-body:'Barlow',sans-serif;
  --font-cond:'Barlow Condensed',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}

/* SCANLINE EFFECT */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.01) 2px,rgba(0,212,255,.01) 4px);pointer-events:none;z-index:9999}

/* TOP NAV */
.topnav{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--accent);padding:0 24px;display:flex;align-items:center;gap:20px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,212,255,.1)}
.logo{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.logo span{color:var(--accent2);-webkit-text-fill-color:var(--accent2)}
.nav-tabs{display:flex;gap:4px;margin-left:auto}
.nav-tab{padding:6px 16px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font-cond);font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:.2s;text-transform:uppercase}
.nav-tab:hover,.nav-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.live-badge{background:var(--red);color:#fff;font-family:var(--font-cond);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:1px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:280px 1fr;gap:0;height:calc(100vh - 56px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:16px 12px}
.content{overflow-y:auto;padding:20px}

/* SECTION TITLES */
.sec-title{font-family:var(--font-cond);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* CARDS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;transition:.2s}
.card:hover{border-color:var(--border2)}
.card.active{border-color:var(--accent);box-shadow:0 0 15px rgba(0,212,255,.15)}

/* FORM ELEMENTS */
.form-row{display:grid;gap:10px;margin-bottom:12px}
.form-row.cols2{grid-template-columns:1fr 1fr}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr}
label{font-family:var(--font-cond);font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:4px}
input,select,textarea{width:100%;background:var(--bg4);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-family:var(--font-body);font-size:13px;transition:.2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
select option{background:var(--bg4)}
input::placeholder{color:var(--text3)}

/* BUTTONS */
.btn{padding:9px 18px;border:none;border-radius:8px;font-family:var(--font-cond);font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:.2s;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0099cc);color:var(--bg)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,212,255,.4)}
.btn-success{background:linear-gradient(135deg,var(--green),#009944);color:#fff}
.btn-danger{background:linear-gradient(135deg,var(--red),#cc2233);color:#fff}
.btn-warn{background:linear-gradient(135deg,var(--yellow),#cc9900);color:var(--bg)}
.btn-purple{background:linear-gradient(135deg,var(--purple),#6633cc);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-full{width:100%;justify-content:center}

/* BALL DISPLAY */
.ball-seq{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.ball{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:600;border:2px solid transparent;cursor:pointer;transition:.2s;position:relative}
.ball:hover{transform:scale(1.15)}
.ball-0{background:#1a2540;border-color:var(--border2);color:var(--text2)}
.ball-1{background:#1a3040;border-color:#2980b9;color:#5dade2}
.ball-2{background:#1a3040;border-color:#2980b9;color:#5dade2}
.ball-3{background:#1a2a40;border-color:#1a6080;color:#3498db}
.ball-4{background:#1a3a20;border-color:var(--green);color:var(--green)}
.ball-6{background:#1a3520;border-color:var(--accent3);color:var(--accent3)}
.ball-W{background:#3a1520;border-color:var(--red);color:var(--red);font-size:10px}
.ball-Wd{background:#2a2010;border-color:var(--yellow);color:var(--yellow);font-size:9px}
.ball-Nb{background:#2a2010;border-color:#ff8c00;color:#ff8c00;font-size:9px}
.over-group{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.over-label{font-family:var(--font-cond);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:6px}
.over-runs{font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:6px}

/* SCORECARD */
.score-main{font-family:var(--font-head);font-size:42px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-1px}
.score-overs{font-family:var(--font-cond);font-size:16px;color:var(--text2);margin-left:8px}
.crr-badge{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-family:var(--font-mono);font-size:12px;color:var(--accent);display:inline-block;margin-left:10px}

/* BATTING TABLE */
.bat-table{width:100%;border-collapse:collapse;margin-top:8px}
.bat-table th{font-family:var(--font-cond);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:6px 8px;border-bottom:1px solid var(--border);text-align:right}
.bat-table th:first-child{text-align:left}
.bat-table td{font-family:var(--font-body);font-size:13px;padding:8px 8px;border-bottom:1px solid var(--border);color:var(--text2);text-align:right;vertical-align:middle}
.bat-table td:first-child{text-align:left;color:var(--text)}
.bat-table tr.batting td{background:rgba(0,212,255,.04)}
.bat-table tr.batting td:first-child{color:var(--accent)}
.bat-table tr.out td{color:var(--text3)}
.bat-table tr.out td:first-child{text-decoration:line-through;color:var(--red);text-decoration-color:rgba(255,68,85,.4)}
.bat-table .name-cell{display:flex;align-items:center;gap:6px}
.badge-bat{background:rgba(0,212,255,.15);color:var(--accent);border-radius:4px;padding:1px 5px;font-size:10px;font-family:var(--font-cond)}
.badge-bowl{background:rgba(255,107,53,.15);color:var(--accent2);border-radius:4px;padding:1px 5px;font-size:10px;font-family:var(--font-cond)}
.hs{color:var(--accent4);font-size:11px}
.sr{font-family:var(--font-mono);font-size:12px}

/* PLAYER SELECTOR */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-top:6px}
.player-chip{background:var(--bg4);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:.2s;font-size:12px;font-family:var(--font-cond)}
.player-chip:hover{border-color:var(--border2);background:var(--bg3)}
.player-chip.selected{border-color:var(--accent);background:rgba(0,212,255,.08);color:var(--accent)}
.player-chip .jersey{font-family:var(--font-mono);font-size:10px;color:var(--text3)}
.player-chip .name{font-weight:600;color:var(--text)}
.player-chip.selected .name{color:var(--accent)}

/* LIVE BALL INPUT */
.ball-input-area{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:16px}
.ball-options{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.ball-opt{width:50px;height:50px;border-radius:12px;border:2px solid var(--border);background:var(--bg4);color:var(--text2);font-family:var(--font-head);font-size:18px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.ball-opt:hover{transform:scale(1.1)}
.ball-opt.sel{transform:scale(1.05)}
.ball-opt[data-val="0"].sel{background:var(--bg3);border-color:var(--text3);color:var(--text)}
.ball-opt[data-val="1"].sel,.ball-opt[data-val="2"].sel,.ball-opt[data-val="3"].sel{background:rgba(41,128,185,.2);border-color:#2980b9;color:#5dade2}
.ball-opt[data-val="4"].sel{background:rgba(0,204,102,.15);border-color:var(--green);color:var(--green)}
.ball-opt[data-val="6"].sel{background:rgba(0,255,136,.15);border-color:var(--accent3);color:var(--accent3)}
.ball-opt[data-val="W"].sel{background:rgba(255,68,85,.15);border-color:var(--red);color:var(--red)}
.ball-opt[data-val="Wd"].sel{background:rgba(255,204,0,.1);border-color:var(--yellow);color:var(--yellow)}
.ball-opt[data-val="Nb"].sel{background:rgba(255,140,0,.1);border-color:#ff8c00;color:#ff8c00}
.ball-opt[data-val="4b"].sel,.ball-opt[data-val="6b"].sel{background:rgba(153,102,255,.1);border-color:var(--purple);color:var(--purple)}

.wicket-opts{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.wkt-type{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg4);color:var(--text2);font-family:var(--font-cond);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.5px}
.wkt-type:hover,.wkt-type.sel{border-color:var(--red);background:rgba(255,68,85,.1);color:var(--red)}

/* PAGE PANELS */
.panel{display:none}.panel.active{display:block}

/* MATCH STATUS BAR */
.match-bar{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);border-radius:12px;padding:16px 20px;display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:16px}
.team-score{display:flex;flex-direction:column}
.team-score.right{align-items:flex-end}
.t-name{font-family:var(--font-cond);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
.t-score{font-family:var(--font-head);font-size:32px;font-weight:700;color:var(--text);line-height:1.1}
.t-overs{font-family:var(--font-cond);font-size:12px;color:var(--text3)}
.vs-badge{text-align:center}
.innings-label{font-family:var(--font-cond);font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:4px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--accent);color:var(--text);padding:12px 20px;border-radius:10px;font-family:var(--font-cond);font-size:14px;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* RESPONSIVE */
@media(max-width:900px){.main{grid-template-columns:1fr}.sidebar{height:auto;max-height:220px}}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="logo">CRIC<span>HEROES</span> ADMIN</div>
  <span class="live-badge">⚡ LIVE</span>
  <div class="nav-tabs" style="margin-left:auto">
    <button class="nav-tab active" onclick="showPanel('ball')">🏏 Ball Entry</button>
    <button class="nav-tab" onclick="showPanel('tournament')">🏆 Tournament</button>
    <button class="nav-tab" onclick="showPanel('team')">👕 Teams</button>
    <button class="nav-tab" onclick="showPanel('player')">👤 Players</button>
    <button class="nav-tab" onclick="showPanel('match')">📋 Matches</button>
    <button class="nav-tab" onclick="showPanel('xi')">📝 Playing XI</button>
    <button class="nav-tab" onclick="showPanel('points')">📊 Points</button>
  </div>
</nav>

<div class="main">

<!-- SIDEBAR: live score display -->
<div class="sidebar">
  <div class="sec-title">Live Score</div>
  <div id="liveSidebar">
    <div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Select a match to start scoring</div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content">

<!-- ═══ BALL ENTRY PANEL ═══ -->
<div id="panel-ball" class="panel active">
  <div class="form-row cols3">
    <div>
      <label>Match</label>
      <select id="bb_match" onchange="loadMatchForScoring()">
        <option value="">Select Match...</option>
      </select>
    </div>
    <div>
      <label>Innings</label>
      <select id="bb_innings">
        <option value="1">1st Innings</option>
        <option value="2">2nd Innings</option>
        <option value="3" style="color:#ff6b35">⚡ Super Over — Team A Bats</option>
        <option value="4" style="color:#ff6b35">⚡ Super Over — Team B Bats</option>
      </select>
    </div>
    <div>
      <label>Batting Team</label>
      <select id="bb_bat_team" onchange="loadBatTeamPlayers()">
        <option value="">Select...</option>
      </select>
    </div>
  </div>

  <!-- Match bar -->
  <div class="match-bar" id="matchBar" style="display:none">
    <div class="team-score">
      <div class="t-name" id="barTeam1Name">-</div>
      <div class="t-score" id="barTeam1Score">-</div>
      <div class="t-overs" id="barTeam1Overs"></div>
    </div>
    <div class="vs-badge">
      <div class="innings-label" id="barInningsLabel">1ST INNINGS</div>
      <div style="font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--text3)">VS</div>
      <div id="barTarget" style="font-family:var(--font-cond);font-size:11px;color:var(--accent);display:none"></div>
    </div>
    <div class="team-score right">
      <div class="t-name" id="barTeam2Name">-</div>
      <div class="t-score" id="barTeam2Score">-</div>
      <div class="t-overs" id="barTeam2Overs"></div>
    </div>
  </div>

  <!-- ⚡ Impact Player Section (IPL Rule) -->
  <div id="impactPlayerSection" style="display:none;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.3);border-radius:10px;padding:14px 16px;margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-family:var(--font-cond);font-size:14px;font-weight:700;color:var(--accent2);letter-spacing:2px">⚡ IMPACT PLAYER</span>
      <span style="font-family:var(--font-cond);font-size:10px;color:var(--text3);letter-spacing:1px">IPL RULE — 1 SUBSTITUTION PER TEAM</span>
    </div>
    <div class="form-row cols2">
      <div>
        <label>Team</label>
        <select id="ip_team" onchange="loadImpactPlayerOptions()"><option value="">Select Team...</option></select>
      </div>
      <div>
        <label>Use in Innings</label>
        <select id="ip_innings">
          <option value="1">1st Innings</option>
          <option value="2">2nd Innings</option>
        </select>
      </div>
    </div>
    <div class="form-row cols2">
      <div>
        <label>⬆ Player IN (Substitute)</label>
        <select id="ip_player_in"><option value="">Select substitute...</option></select>
      </div>
      <div>
        <label>⬇ Player OUT (Replaced)</label>
        <select id="ip_player_out"><option value="">Select player replaced...</option></select>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <button class="btn btn-warn btn-sm" onclick="saveImpactPlayer()">⚡ Confirm Impact Player</button>
      <span id="impactPlayerStatus" style="font-family:var(--font-cond);font-size:11px;color:var(--text3)"></span>
    </div>
  </div>

  <!-- Current Batsmen & Bowler -->
  <div class="form-row cols3" style="margin-bottom:8px">
    <div>
      <label>Striker 🏏</label>
      <select id="bb_striker">
        <option value="">Select...</option>
      </select>
    </div>
    <div>
      <label>Non-Striker</label>
      <select id="bb_nonstriker">
        <option value="">Select...</option>
      </select>
    </div>
    <div>
      <label>Bowler ⚡</label>
      <select id="bb_bowler">
        <option value="">Select...</option>
      </select>
    </div>
  </div>

  <!-- Ball Input -->
  <div class="ball-input-area">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <span id="curOverLabel" style="font-family:var(--font-cond);font-size:20px;font-weight:700;color:var(--accent)">Over 0.0</span>
        <span id="curCRR" class="crr-badge">CRR: 0.00</span>
      </div>
      <button class="btn btn-danger btn-sm" onclick="undoLastBall()">↩ Undo Last Ball</button>
    </div>

    <div style="margin-bottom:10px">
      <label>Ball Outcome</label>
      <div class="ball-options">
        <button class="ball-opt" data-val="0" onclick="selectBallVal(this)">0</button>
        <button class="ball-opt" data-val="1" onclick="selectBallVal(this)">1</button>
        <button class="ball-opt" data-val="2" onclick="selectBallVal(this)">2</button>
        <button class="ball-opt" data-val="3" onclick="selectBallVal(this)">3</button>
        <button class="ball-opt" data-val="4" onclick="selectBallVal(this)">4</button>
        <button class="ball-opt" data-val="6" onclick="selectBallVal(this)">6</button>
        <button class="ball-opt" data-val="W" onclick="selectBallVal(this)">W</button>
        <div style="width:1px;background:var(--border);margin:0 4px"></div>
        <button class="ball-opt" data-val="Wd" onclick="selectBallVal(this)" style="font-size:12px">Wd</button>
        <button class="ball-opt" data-val="Nb" onclick="selectBallVal(this)" style="font-size:12px">Nb</button>
        <button class="ball-opt" data-val="Bye" onclick="selectBallVal(this)" style="font-size:11px">Bye</button>
        <button class="ball-opt" data-val="LB" onclick="selectBallVal(this)" style="font-size:11px">LB</button>
      </div>
    </div>

    <!-- Wicket options (shown when W selected) -->
    <div id="wicketArea" style="display:none;margin-bottom:10px">
      <label>Wicket Type</label>
      <div class="wicket-opts">
        <button class="wkt-type" onclick="selectWktType(this,'Bowled')">Bowled</button>
        <button class="wkt-type" onclick="selectWktType(this,'Caught')">Caught</button>
        <button class="wkt-type" onclick="selectWktType(this,'LBW')">LBW</button>
        <button class="wkt-type" onclick="selectWktType(this,'Stumped')">Stumped</button>
        <button class="wkt-type" onclick="selectWktType(this,'Run Out')">Run Out</button>
        <button class="wkt-type" onclick="selectWktType(this,'Hit Wicket')">Hit Wicket</button>
        <button class="wkt-type" onclick="selectWktType(this,'Obstructing')">Obstruct</button>
      </div>
      <div class="form-row cols2" style="margin-top:8px">
        <div>
          <label>Fielder (for Catch/Runout)</label>
          <select id="wkt_fielder"><option value="">None / Direct</option></select>
        </div>
        <div>
          <label>Runs scored (before wicket)</label>
          <input type="number" id="wkt_runs" value="0" min="0" max="6">
        </div>
      </div>
    </div>

    <!-- Extras runs input -->
    <div id="extrasArea" style="display:none;margin-bottom:10px">
      <label id="extrasLabel">Extras Runs</label>
      <input type="number" id="extras_runs" value="1" min="0" max="10" style="max-width:120px">
      <div id="extrasHint" style="font-size:10px;color:var(--text3);font-family:var(--font-cond);margin-top:4px"></div>
    </div>

    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-success" onclick="recordBall()" style="padding:12px 32px;font-size:15px">
        ▶ Record Ball
      </button>
      <div id="lastBallDisplay" style="font-family:var(--font-mono);font-size:18px;color:var(--accent);background:var(--bg4);padding:8px 16px;border-radius:8px;min-width:60px;text-align:center"></div>
    </div>
  </div>

  <!-- Over History -->

</div>

        <option value="0">No — Standard Rules</option>

  <button class="btn btn-primary" onclick="saveMatch()">+ Add Match</button>

  <div class="form-row cols2">

        <option value="">Select Team...</option>
      </select>

  <div id="xiPlayerSelect" class="player-grid" style="margin-bottom:12px"></div>
  <button class="btn btn-primary" onclick="savePlayingXI()">💾 Save Playing XI</button>
  <div class="sec-title" style="margin-top:16px">Current XI</div>
  <div id="xiList"></div>
</div>

<div id="panel-points" class="panel">
  <div class="form-row">
    <div>
      <label>Tournament</label>
      <select id="pt_tournament" onchange="renderPointsTable()">

  </div>
  <div id="pointsTableDisplay"></div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CRICHEROES ADMIN — Complete Cricket Management System
//  Data Schema: Tournament → Team → Player → Match →
//               PlayingXI → BallByBall → Scorecard
// ═══════════════════════════════════════════════════════

// ── DATA STORE ──────────────────────────────────────────
const DB = {
  tournaments: [], teams: [], players: [],
  matches: [], playingXI: [], balls: [],
  _nextId: { t: 1, tm: 1, pl: 1, m: 1, b: 1 }
};

function saveDB() { localStorage.setItem('cricheroes_db', JSON.stringify(DB)); }
function loadDB() {
  const raw = localStorage.getItem('cricheroes_db');
  if (raw) { Object.assign(DB, JSON.parse(raw)); }
}

// ── ID GENERATION ────────────────────────────────────────
function nextId(type) {
  const id = DB._nextId[type] || 1;
  DB._nextId[type] = id + 1;
  return id;
}

// ── TOAST ────────────────────────────────────────────────
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

// ── PANEL SWITCHING ──────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  // Refresh dropdowns
  const actions = {
    tournament: () => renderTournamentList(),
    team: () => { fillTournamentDropdowns(); renderTeamList(); },
    player: () => { fillTeamDropdowns(); renderPlayerList(); },
    match: () => { fillTournamentDropdowns(); renderMatchList(); },
    xi: () => { fillMatchDropdowns(); renderXIList(); },
    ball: () => { fillMatchDropdowns(); },
    points: () => { fillTournamentDropdowns(); renderPointsTable(); }
  };
  if (actions[name]) actions[name]();
}

// ── LOOKUPS (solve the "number not name" problem) ──────────
function getTeamName(id) {
  const t = DB.teams.find(t => t.id == id);
  return t ? t.name : '(Team ' + id + ')';
}
function getPlayerName(id) {
  const p = DB.players.find(p => p.id == id);
  return p ? p.name : '(Player ' + id + ')';
}
function getPlayerJersey(id) {
  const p = DB.players.find(p => p.id == id);
  return p ? '#' + (p.jersey || p.id) : '';
}
function getTournamentName(id) {
  const t = DB.tournaments.find(t => t.id == id);
  return t ? t.name : '(Tournament ' + id + ')';
}
function getMatchLabel(m) {
  if (!m) return '';
  return getTeamName(m.team1) + ' vs ' + getTeamName(m.team2) +
    (m.venue ? ' @ ' + m.venue : '') +
    (m.date ? ' (' + m.date + ')' : '');
}

// ── FILL DROPDOWNS ────────────────────────────────────────
function fillTournamentDropdowns() {
  const ids = ['tm_tournament','m_tournament','pt_tournament','bb_match'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id === 'bb_match' || id === 'xi_match') return; // handled separately
    const val = el.value;
    el.innerHTML = '<option value="">Select Tournament...</option>';
    DB.tournaments.forEach(t => {
      el.innerHTML += `<option value="${t.id}">${t.name} (${t.type})</option>`;
    });
    el.value = val;
  });
}

function fillTeamDropdowns() {
  const el = document.getElementById('pl_team');
  if (!el) return;
  const val = el.value;
  el.innerHTML = '<option value="">Select Team...</option>';
  DB.teams.forEach(t => {
    el.innerHTML += `<option value="${t.id}">${t.name}</option>`;
  });
  el.value = val;
}

function fillMatchDropdowns() {
  ['bb_match','xi_match'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const val = el.value;
    el.innerHTML = '<option value="">Select Match...</option>';
    DB.matches.forEach(m => {
      el.innerHTML += `<option value="${m.id}">${getMatchLabel(m)}</option>`;
    });
    el.value = val;
  });
}

// ── TOURNAMENT CRUD ──────────────────────────────────────
function saveTournament() {
  const name = document.getElementById('t_name').value.trim();
  const type = document.getElementById('t_type').value;
  const teams = parseInt(document.getElementById('t_teams').value) || 8;
  const country = document.getElementById('t_country').value.trim();
  if (!name) { toast('Enter tournament name', 'error'); return; }
  DB.tournaments.push({ id: nextId('t'), name, type, teams, country });
  saveDB();
  document.getElementById('t_name').value = '';
  renderTournamentList();
  toast('✅ Tournament "' + name + '" added!');
}

function renderTournamentList() {
  const div = document.getElementById('tournamentList');
  if (!div) return;
  div.innerHTML = DB.tournaments.length ? DB.tournaments.map(t => `
    <div class="card" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-family:var(--font-cond);font-size:16px;font-weight:700">${t.name}</div>
        <div style="font-size:12px;color:var(--text3)">${t.type} • ${t.teams} Teams • ${t.country}</div>
      </div>
      <div style="display:flex;gap:6px">
        <span style="background:rgba(0,212,255,.1);color:var(--accent);border-radius:6px;padding:3px 10px;font-family:var(--font-cond);font-size:12px;font-weight:700">ID: ${t.id}</span>
        <button class="btn btn-danger btn-sm" onclick="deleteTournament(${t.id})">Del</button>
      </div>
    </div>`).join('') : '<div style="color:var(--text3);text-align:center;padding:20px">No tournaments yet</div>';
}

function deleteTournament(id) {
  if (!confirm('Delete tournament?')) return;
  DB.tournaments = DB.tournaments.filter(t => t.id !== id);
  saveDB(); renderTournamentList(); toast('Tournament deleted');
}

// ── TEAM CRUD ────────────────────────────────────────────
function saveTeam() {
  const tId = parseInt(document.getElementById('tm_tournament').value);
  const name = document.getElementById('tm_name').value.trim();
  const captain = document.getElementById('tm_captain').value.trim();
  const jersey = document.getElementById('tm_jersey').value.trim() || '#0066CC';
  if (!tId || !name) { toast('Select tournament and enter team name', 'error'); return; }
  DB.teams.push({ id: nextId('tm'), tournamentId: tId, name, captain, jersey });
  saveDB();
  document.getElementById('tm_name').value = '';
  document.getElementById('tm_captain').value = '';
  renderTeamList();
  fillTeamDropdowns();
  toast('✅ Team "' + name + '" added!');
}

function renderTeamList() {
  const div = document.getElementById('teamList');
  if (!div) return;
  const tId = document.getElementById('tm_tournament')?.value;
  const teams = tId ? DB.teams.filter(t => t.tournamentId == tId) : DB.teams;
  div.innerHTML = teams.length ? teams.map(t => `
    <div class="card" style="display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:10px;background:${t.jersey};display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:700;color:#fff;font-size:14px;flex-shrink:0">${t.name.slice(0,2).toUpperCase()}</div>
      <div style="flex:1">
        <div style="font-family:var(--font-cond);font-size:15px;font-weight:700">${t.name}</div>
        <div style="font-size:11px;color:var(--text3)">Captain: ${t.captain || 'TBA'} • ${getTournamentName(t.tournamentId)}</div>
      </div>
      <span style="background:rgba(0,212,255,.1);color:var(--accent);border-radius:6px;padding:3px 10px;font-family:var(--font-cond);font-size:12px;font-weight:700">ID: ${t.id}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteTeam(${t.id})">Del</button>
    </div>`).join('') : '<div style="color:var(--text3);text-align:center;padding:20px">No teams</div>';
}

function deleteTeam(id) {
  if (!confirm('Delete team?')) return;
  DB.teams = DB.teams.filter(t => t.id !== id);
  saveDB(); renderTeamList(); toast('Team deleted');
}

// ── PLAYER CRUD ──────────────────────────────────────────
function savePlayer() {
  const teamId = parseInt(document.getElementById('pl_team').value);
  const name = document.getElementById('pl_name').value.trim();
  const role = document.getElementById('pl_role').value;
  const jersey = parseInt(document.getElementById('pl_jersey').value) || 0;
  const captain = parseInt(document.getElementById('pl_captain').value) || 0;
  if (!teamId || !name) { toast('Select team and enter player name', 'error'); return; }
  DB.players.push({ id: nextId('pl'), teamId, name, role, jersey, captain,
                    stats: { matches:0, runs:0, balls:0, fours:0, sixes:0, wickets:0, overs:0, runsConceded:0 } });
  saveDB();
  document.getElementById('pl_name').value = '';
  renderPlayerList();
  toast('✅ Player "' + name + '" added!');
}

function renderPlayerList() {
  const div = document.getElementById('playerList');
  if (!div) return;
  const tId = document.getElementById('pl_team')?.value;
  const players = tId ? DB.players.filter(p => p.teamId == tId) : DB.players;
  div.innerHTML = players.length ? players.map(p => `
    <div class="player-chip" style="position:relative">
      <div class="jersey">#${p.jersey || p.id}</div>
      <div class="name">${p.name}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${p.role}${p.captain?'  👑':''}</div>
      <div style="font-size:9px;color:var(--accent);margin-top:2px">ID: ${p.id}</div>
      <button onclick="deletePlayer(${p.id})" style="position:absolute;top:4px;right:4px;background:none;border:none;color:var(--red);cursor:pointer;font-size:10px">✕</button>
    </div>`).join('') : '<div style="color:var(--text3);padding:20px;grid-column:1/-1">No players</div>';
}

function deletePlayer(id) {
  DB.players = DB.players.filter(p => p.id !== id);
  saveDB(); renderPlayerList(); toast('Player removed');
}

// ── MATCH CRUD ────────────────────────────────────────────
function loadTeamsForMatch() {
  const tId = document.getElementById('m_tournament').value;
  const teams = DB.teams.filter(t => t.tournamentId == tId);
  ['m_team1','m_team2','m_toss'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">Select...</option>';
    teams.forEach(t => { el.innerHTML += `<option value="${t.id}">${t.name}</option>`; });
  });
}

function saveMatch() {
  const tId = parseInt(document.getElementById('m_tournament').value);
  const t1 = parseInt(document.getElementById('m_team1').value);
  const t2 = parseInt(document.getElementById('m_team2').value);
  const venue = document.getElementById('m_venue').value.trim();
  const date = document.getElementById('m_date').value;
  const toss = parseInt(document.getElementById('m_toss').value);
  const tossDec = document.getElementById('m_toss_dec').value;
  if (!tId || !t1 || !t2 || t1 === t2) { toast('Select two different teams', 'error'); return; }
  const id = nextId('m');
  const impactPlayerRule = parseInt(document.getElementById('m_impact_rule')?.value) || 0;
  DB.matches.push({ id, tournamentId: tId, team1: t1, team2: t2, venue, date, toss, tossDec, status: 'upcoming', impactPlayerRule, impactPlayers: {} });
  saveDB();
  renderMatchList();
  fillMatchDropdowns();
  toast('✅ Match added! Match ID: ' + id);
}

function renderMatchList() {
  const div = document.getElementById('matchList');
  if (!div) return;
  div.innerHTML = DB.matches.length ? DB.matches.map(m => {
    const sc = getMatchScore(m.id, 1);
    const sc2 = getMatchScore(m.id, 2);
    return `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-family:var(--font-cond);font-size:11px;color:var(--text3);letter-spacing:1px">${m.date || 'TBD'} • ${m.venue || 'TBD'}</span>
        <div style="display:flex;gap:6px">
          <span style="background:rgba(0,212,255,.1);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:11px;font-family:var(--font-cond)">ID: ${m.id}</span>
          <button class="btn btn-danger btn-sm" onclick="deleteMatch(${m.id})">Del</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-family:var(--font-cond);font-size:18px;font-weight:700">${getTeamName(m.team1)}</div>
          ${sc ? `<div style="font-family:var(--font-mono);font-size:13px;color:var(--accent)">${sc.runs}/${sc.wickets} (${sc.overs})</div>` : '<div style="color:var(--text3);font-size:12px">Not started</div>'}
        </div>
        <div style="font-family:var(--font-head);font-size:18px;color:var(--text3)">VS</div>
        <div style="text-align:right">
          <div style="font-family:var(--font-cond);font-size:18px;font-weight:700">${getTeamName(m.team2)}</div>
          ${sc2 ? `<div style="font-family:var(--font-mono);font-size:13px;color:var(--accent2)">${sc2.runs}/${sc2.wickets} (${sc2.overs})</div>` : '<div style="color:var(--text3);font-size:12px">Not started</div>'}
        </div>
      </div>
      ${m.result ? `<div style="margin-top:6px;font-family:var(--font-cond);font-size:13px;color:var(--accent3);font-weight:600">🏆 ${m.result}</div>` : ''}
    </div>`;
  }).join('') : '<div style="color:var(--text3);text-align:center;padding:20px">No matches</div>';
}

function deleteMatch(id) {
  if (!confirm('Delete match and all ball data?')) return;
  DB.matches = DB.matches.filter(m => m.id !== id);
  DB.balls = DB.balls.filter(b => b.matchId !== id);
  DB.playingXI = DB.playingXI.filter(x => x.matchId !== id);
  saveDB(); renderMatchList(); toast('Match deleted');
}

// ── PLAYING XI ────────────────────────────────────────────
function loadXIOptions() {
  const mId = document.getElementById('xi_match').value;
  const match = DB.matches.find(m => m.id == mId);
  if (!match) return;
  const sel = document.getElementById('xi_team');
  sel.innerHTML = '<option value="">Select Team...</option>';
  [match.team1, match.team2].forEach(tId => {
    sel.innerHTML += `<option value="${tId}">${getTeamName(tId)}</option>`;
  });
  renderXIList();
}

function renderXIPlayerSelect() {
  const mId = document.getElementById('xi_match').value;
  const tId = document.getElementById('xi_team').value;
  const div = document.getElementById('xiPlayerSelect');
  if (!mId || !tId) { div.innerHTML = ''; return; }
  const existing = DB.playingXI.filter(x => x.matchId == mId && x.teamId == tId).map(x => x.playerId);
  const players = DB.players.filter(p => p.teamId == tId);
  div.innerHTML = players.map(p => `
    <div class="player-chip ${existing.includes(p.id) ? 'selected' : ''}" onclick="toggleXIPlayer(this, ${p.id})" data-pid="${p.id}">
      <div class="jersey">#${p.jersey || p.id}</div>
      <div class="name">${p.name}</div>
      <div style="font-size:10px;color:inherit;margin-top:2px;opacity:.7">${p.role}</div>
    </div>`).join('');
}

function toggleXIPlayer(el, pid) {
  el.classList.toggle('selected');
  const selected = document.querySelectorAll('#xiPlayerSelect .player-chip.selected').length;
  if (selected > 11) { el.classList.remove('selected'); toast('Only 11 players allowed!', 'error'); }
}

function savePlayingXI() {
  const mId = parseInt(document.getElementById('xi_match').value);
  const tId = parseInt(document.getElementById('xi_team').value);
  if (!mId || !tId) { toast('Select match and team', 'error'); return; }
  const selected = [...document.querySelectorAll('#xiPlayerSelect .player-chip.selected')].map(el => parseInt(el.dataset.pid));
  if (selected.length !== 11) { toast('Select exactly 11 players', 'error'); return; }
  DB.playingXI = DB.playingXI.filter(x => !(x.matchId === mId && x.teamId === tId));
  selected.forEach(pid => DB.playingXI.push({ matchId: mId, teamId: tId, playerId: pid }));
  saveDB(); renderXIList();
  toast('✅ Playing XI saved for ' + getTeamName(tId));
}

function renderXIList() {

  if (!div) return;

  if (!mId) { div.innerHTML = ''; return; }

  div.innerHTML = [match.team1, match.team2].map(tId => {
    const xi = DB.playingXI.filter(x => x.matchId == mId && x.teamId == tId);

      <div class="player-grid">${xi.map(x => {
        const p = DB.players.find(pl => pl.id === x.playerId);
        return p ? `<div class="player-chip"><div class="jersey">#${p.jersey||p.id}</div><div class="name">${p.name}</div><div style="font-size:9px;color:var(--text3)">${p.role}</div></div>` : '';
      }).join('')}</div>
      ${xi.length === 0 ? '<div style="color:var(--text3);font-size:12px">No XI selected</div>' : ''}

// ── BALL BY BALL SCORING ──────────────────────────────────
let selectedBallVal = null;
let selectedWktType = null;

function selectBallVal(el) {
  document.querySelectorAll('.ball-opt').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  selectedBallVal = el.dataset.val;
  const isWicket = selectedBallVal === 'W';
  const isExtras = ['Wd','Nb','Bye','LB'].includes(selectedBallVal);
  document.getElementById('wicketArea').style.display = isWicket ? 'block' : 'none';
  document.getElementById('extrasArea').style.display = isExtras ? 'block' : 'none';
  // Update label, default value and hint based on extra type (proper cricket rules)
  if (isExtras) {
    const lbl = document.getElementById('extrasLabel');
    const inp = document.getElementById('extras_runs');
    const hint = document.getElementById('extrasHint');
    if (selectedBallVal === 'Wd') {
      if (lbl) lbl.textContent = 'Wide Runs';
      if (inp) inp.value = 1;
      if (hint) hint.textContent = '1 = penalty only | 2 = penalty + 1 run | 5 = wide boundary (4+1)';
    } else if (selectedBallVal === 'Nb') {
      if (lbl) lbl.textContent = 'Runs Off Bat (No-ball)';
      if (inp) inp.value = 0;
      if (hint) hint.textContent = 'Enter runs hit by batsman. The 1-run no-ball penalty is auto-added.';
    } else if (selectedBallVal === 'Bye') {
      if (lbl) lbl.textContent = 'Bye Runs';
      if (inp) inp.value = 1;
      if (hint) hint.textContent = 'Goes to extras. Batsman gets NO credit. Counts as legal delivery.';
    } else if (selectedBallVal === 'LB') {
      if (lbl) lbl.textContent = 'Leg-bye Runs';
      if (inp) inp.value = 1;
      if (hint) hint.textContent = 'Goes to extras. Batsman gets NO credit. Counts as legal delivery.';
    }
  }
}

function selectWktType(el, type) {
  document.querySelectorAll('.wkt-type').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  selectedWktType = type;
  // Load fielders from bowling team

  const batTeam = document.getElementById('bb_bat_team').value;
  const match = DB.matches.find(m => m.id == mId);

  const bowlTeamId = parseInt(batTeam) === match.team1 ? match.team2 : match.team1;

  sel.innerHTML = '<option value="">None / Direct</option>';

  const mId = document.getElementById('bb_match')?.value;
  const tId = parseInt(document.getElementById('ip_team')?.value);
  if (!mId || !tId) return;
  const match = DB.matches.find(m => m.id == mId);

function saveImpactPlayer() {
  const mId = parseInt(document.getElementById('bb_match')?.value);
  const match = DB.matches.find(m => m.id == mId);
  if (!match) { toast('Select a match first', 'error'); return; }
  const tId = parseInt(document.getElementById('ip_team').value);
  const playerIn = parseInt(document.getElementById('ip_player_in').value);
  const playerOut = parseInt(document.getElementById('ip_player_out').value);
  const innings = parseInt(document.getElementById('ip_innings').value);
  if (!tId || !playerIn || !playerOut) { toast('Select team, player in and player out', 'error'); return; }
  if (playerIn === playerOut) { toast('Player In and Player Out must be different!', 'error'); return; }
  if (!match.impactPlayers) match.impactPlayers = {};
  const teamKey = tId === match.team1 ? 'team1' : 'team2';
  match.impactPlayers[teamKey] = { playerIn, playerOut, innings };
  saveDB();
  loadImpactPlayerOptions();
  // Refresh striker / non-striker / bowler dropdowns immediately
  // so both batting-team and bowling-team impact players appear right away
  const batTeamVal = document.getElementById('bb_bat_team')?.value;

function loadBatTeamPlayers() {
  const mId = document.getElementById('bb_match').value;
  const batTeam = document.getElementById('bb_bat_team').value;
  const match = DB.matches.find(m => m.id == mId);
  if (!match || !batTeam) return;
  const bowlTeam = parseInt(batTeam) === match.team1 ? match.team2 : match.team1;
  const batXI = DB.playingXI.filter(x => x.matchId == mId && x.teamId == batTeam);
  const bowlXI = DB.playingXI.filter(x => x.matchId == mId && x.teamId == bowlTeam);

  // ⚡ Include impact player in dropdowns if set
  if (match.impactPlayerRule && match.impactPlayers) {
    const batKey = parseInt(batTeam) === match.team1 ? 'team1' : 'team2';
    const bowlKey = parseInt(batTeam) === match.team1 ? 'team2' : 'team1';
    const batIP = match.impactPlayers[batKey];
    const bowlIP = match.impactPlayers[bowlKey];
    if (batIP?.playerIn && !batXI.find(x => x.playerId === batIP.playerIn)) {
      batXI.push({ matchId: parseInt(mId), teamId: parseInt(batTeam), playerId: batIP.playerIn });
    }
    if (bowlIP?.playerIn && !bowlXI.find(x => x.playerId === bowlIP.playerIn)) {
      bowlXI.push({ matchId: parseInt(mId), teamId: bowlTeam, playerId: bowlIP.playerIn });
    }
  }

  const fillSel = (selId, xi) => {
    const el = document.getElementById(selId);
    el.innerHTML = '<option value="">Select...</option>';
    xi.forEach(x => { el.innerHTML += `<option value="${x.playerId}">${getPlayerName(x.playerId)} (${getPlayerJersey(x.playerId)})</option>`; });
  };
  fillSel('bb_striker', batXI);
  fillSel('bb_nonstriker', batXI);
  fillSel('bb_bowler', bowlXI);
  updateOverDisplay();
  renderOverHistory();
  renderLiveScorecards();
}

function getCurrentOverBall(mId, innings) {
  const balls = DB.balls.filter(b => b.matchId == mId && b.innings == innings && !b.wide && !b.noball);
  const legalBalls = balls.length;
  const over = Math.floor(legalBalls / 6);
  const ball = legalBalls % 6;
  return { over, ball, totalLegal: legalBalls };
}

function updateOverDisplay() {
  const mId = document.getElementById('bb_match').value;
  const innings = parseInt(document.getElementById('bb_innings').value);
  const { over, ball } = getCurrentOverBall(mId, innings);
  document.getElementById('curOverLabel').textContent = `Over ${over}.${ball}`;
  const sc = getMatchScore(mId, innings);
  if (sc && sc.totalBalls > 0) {
    const crr = (sc.runs / (sc.totalBalls / 6)).toFixed(2);
    document.getElementById('curCRR').textContent = 'CRR: ' + crr;
  }
}

function recordBall() {
  const mId = parseInt(document.getElementById('bb_match').value);
  const innings = parseInt(document.getElementById('bb_innings').value);
  const batTeam = parseInt(document.getElementById('bb_bat_team').value);
  const striker = parseInt(document.getElementById('bb_striker').value);
  const nonStriker = parseInt(document.getElementById('bb_nonstriker').value);
  const bowler = parseInt(document.getElementById('bb_bowler').value);
  if (!mId || !batTeam || !striker || !nonStriker || !bowler) {
    toast('Select match, players and bowler', 'error'); return;
  }
  if (!selectedBallVal) { toast('Select ball outcome', 'error'); return; }
  const { over, ball, totalLegal } = getCurrentOverBall(mId, innings);

  // ── PRE-RECORDING VALIDATIONS ──────────────────────────────
  const matchObj = DB.matches.find(m => m.id == mId);
  const tourn = DB.tournaments.find(t => t.id == matchObj?.tournamentId);
  const tType = tourn?.type || 'T20';
  const isSO = innings >= 3;
  const maxOvers = isSO ? 1 : tType==='T10'?10 : tType==='ODI'?50 : tType==='Test'?9999 : 20;
  const maxWicks = isSO ? 2 : 10;

  // 1. Over-limit lock
  if (totalLegal >= maxOvers * 6) {
    toast(`❌ Innings complete! All ${maxOvers} over${maxOvers>1?'s':''} bowled. Switch innings.`, 'error'); return;
  }
  // 2. All-out lock
  const wktsSoFar = DB.balls.filter(b => b.matchId==mId && b.innings==innings && b.wicket).length;
  if (wktsSoFar >= maxWicks) {
    toast(`❌ Innings over — ${isSO?'2 wickets fallen':'All out'}! Switch innings.`, 'error'); return;
  }
  // 3. Consecutive over restriction
  if (ball === 0 && over > 0) {
    const prevBowler = DB.balls.filter(b => b.matchId==mId && b.innings==innings && b.over===over-1).slice(-1)[0]?.bowlerId;
    if (prevBowler === bowler) {
      toast(`❌ ${getPlayerName(bowler)} cannot bowl consecutive overs! Choose another bowler.`, 'error'); return;
    }
  }
  // 4. Dismissed batsman guard
  const dismissed = new Set(DB.balls.filter(b => b.matchId==mId && b.innings==innings && b.wicket).map(b => b.strikerId));
  if (dismissed.has(striker)) {
    toast(`❌ ${getPlayerName(striker)} is already dismissed! Select the incoming batsman.`, 'error'); return;
  }
  if (dismissed.has(nonStriker)) {
    toast(`❌ ${getPlayerName(nonStriker)} is already dismissed! Fix the non-striker.`, 'error'); return;
  }
  const isWide = selectedBallVal === 'Wd';
  const isNoBall = selectedBallVal === 'Nb';
  const isBye = selectedBallVal === 'Bye';
  const isLegBye = selectedBallVal === 'LB';
  const isWicket = selectedBallVal === 'W';
  // ── CRICKET-CORRECT BALL SCHEMA ──────────────────────────
  // runs    = batsman runs only (counts to bat avg/SR, NOT for extras)
  // wide    = total wide extras (1 penalty + any extra runs run)
  // noball  = 1 (the penalty run always charged to bowler)
  // bye     = actual bye runs (extras, NOT credited to batsman)
  // legbye  = actual leg-bye runs (extras, NOT credited to batsman)
  let batRuns = 0, wideRuns = 0, noballPenalty = 0, byeRuns = 0, legByeRuns = 0;
  let four = 0, six = 0;

  if (isWicket) {
    batRuns = parseInt(document.getElementById('wkt_runs').value) || 0;
    if (batRuns === 4) four = 1;
    if (batRuns === 6) six = 1;
  } else if (isWide) {
    // Min 1 (penalty). If batsmen run: 1+runs. Wide boundary = 4 (not 5 per Laws).
    wideRuns = parseInt(document.getElementById('extras_runs').value) || 1;
  } else if (isNoBall) {
    noballPenalty = 1;  // always 1 run penalty
    batRuns = parseInt(document.getElementById('extras_runs').value) || 0; // runs off bat
    if (batRuns === 4) four = 1;
    if (batRuns === 6) six = 1;
  } else if (isBye) {
    byeRuns = parseInt(document.getElementById('extras_runs').value) || 1;
  } else if (isLegBye) {
    legByeRuns = parseInt(document.getElementById('extras_runs').value) || 1;
  } else {
    batRuns = parseInt(selectedBallVal) || 0;
    if (batRuns === 4) four = 1;
    if (batRuns === 6) six = 1;
  }

  const ballRecord = {
    id: nextId('b'), matchId: mId, innings, over, ball,
    strikerId: striker, nonStrikerId: nonStriker, bowlerId: bowler,
    runs: batRuns, four, six,
    wide: wideRuns,
    noball: noballPenalty,
    bye: byeRuns,
    legbye: legByeRuns,
    wicket: isWicket ? 1 : 0,
    wicketType: isWicket ? (selectedWktType || 'Unknown') : '',
    fielderId: isWicket ? (parseInt(document.getElementById('wkt_fielder').value) || 0) : 0,
    rawVal: selectedBallVal, timestamp: Date.now()
  };

  DB.balls.push(ballRecord);

  // ── Strike rotation (two INDEPENDENT cricket rules) ─────────
  // Rule 1: Odd runs on any ball → batsmen cross → swap
  // Rule 2: End of over → ALWAYS swap (bowling end changes each over)
  // On last ball with 1 run: Rule1 swap + Rule2 swap = net zero → striker stays ✔
  let runsForRotation;
  if (isWide) runsForRotation = Math.max(0, wideRuns - 1);
  else if (isBye) runsForRotation = byeRuns;
  else if (isLegBye) runsForRotation = legByeRuns;
  else runsForRotation = batRuns;

  if (runsForRotation % 2 === 1) {
    const s = document.getElementById('bb_striker').value;
    const ns = document.getElementById('bb_nonstriker').value;
    document.getElementById('bb_striker').value = ns;
    document.getElementById('bb_nonstriker').value = s;
  }
  // End-of-over: ALWAYS swap (independent of run rotation)
  if (!isWide && !isNoBall && ball === 5) {
    const s = document.getElementById('bb_striker').value;
    const ns = document.getElementById('bb_nonstriker').value;
    document.getElementById('bb_striker').value = ns;
    document.getElementById('bb_nonstriker').value = s;
  }

  saveDB();
  updateOverDisplay();
  renderOverHistory();
  renderLiveScorecards();
  updateMatchBar();
  document.getElementById('lastBallDisplay').textContent = selectedBallVal;

  // Visual feedback
  const dispVal = isWicket ? 'W' : isWide ? 'Wd' : isNoBall ? 'Nb' : String(runs);
  const colors = {W:'#ff4455',Wd:'#ffcc00',Nb:'#ff8c00','4':'#00cc66','6':'#00ff88'};
  document.getElementById('lastBallDisplay').style.color = colors[dispVal] || 'var(--accent)';

  // Reset selection
  document.querySelectorAll('.ball-opt').forEach(b => b.classList.remove('sel'));
  document.querySelectorAll('.wkt-type').forEach(b => b.classList.remove('sel'));
  selectedBallVal = null; selectedWktType = null;
  document.getElementById('wicketArea').style.display = 'none';
  document.getElementById('extrasArea').style.display = 'none';

  toast('✅ Ball recorded: ' + dispVal);

  // Auto-suggest new batsman if wicket
  if (isWicket) { toast('🚨 Wicket! Select new batsman at striker end', 'error'); }
}

function undoLastBall() {
  const mId = parseInt(document.getElementById('bb_match').value);
  const innings = parseInt(document.getElementById('bb_innings').value);
  const matchBalls = DB.balls.filter(b => b.matchId === mId && b.innings === innings);
  if (!matchBalls.length) { toast('Nothing to undo', 'error'); return; }
  const last = matchBalls[matchBalls.length - 1];
  DB.balls = DB.balls.filter(b => b.id !== last.id);
  saveDB();
  updateOverDisplay();
  renderOverHistory();
  renderLiveScorecards();
  updateMatchBar();
  toast('↩ Ball removed: ' + last.rawVal);
}

// ── SCORE CALCULATION ─────────────────────────────────────
function getMatchScore(mId, innings) {
  const balls = DB.balls.filter(b => b.matchId == mId && b.innings == innings);
  if (!balls.length) return null;
  const legalBalls = balls.filter(b => !b.wide && !b.noball);
  const totalRuns = balls.reduce((s, b) => s + b.runs + b.wide + b.noball + b.bye + b.legbye, 0);
  const wickets = balls.filter(b => b.wicket).length;
  const over = Math.floor(legalBalls.length / 6);
  const ball2 = legalBalls.length % 6;
  return { runs: totalRuns, wickets, overs: over + '.' + ball2, totalBalls: legalBalls.length };
}

function updateMatchBar() {
  const mId = document.getElementById('bb_match')?.value;
  if (!mId) return;
  [1, 2].forEach(inn => {
    const sc = getMatchScore(mId, inn);
    const match = DB.matches.find(m => m.id == mId);
    const prefix = inn === 1 ? 'barTeam1' : 'barTeam2';
    if (sc) {
      document.getElementById(prefix + 'Score').textContent = sc.runs + '/' + sc.wickets;
      document.getElementById(prefix + 'Overs').textContent = sc.overs + ' ov';
    }
    // Target display
    if (inn === 2) {
      const sc1 = getMatchScore(mId, 1);
      if (sc1) {
        const target = sc1.runs + 1;
        const targetEl = document.getElementById('barTarget');
        if (targetEl) { targetEl.textContent = 'Target: ' + target; targetEl.style.display = 'block'; }
      }
    }
  });
  document.getElementById('barInningsLabel').textContent =
    parseInt(document.getElementById('bb_innings')?.value) === 1 ? '1ST INNINGS' : '2ND INNINGS';
}

function renderOverHistory() {
  const mId = document.getElementById('bb_match')?.value;
  const innings = document.getElementById('bb_innings')?.value;
  if (!mId || !innings) return;
  const balls = DB.balls.filter(b => b.matchId == mId && b.innings == innings);
  const overs = {};
  balls.forEach(b => {
    const key = b.over;
    if (!overs[key]) overs[key] = [];
    overs[key].push(b);
  });
  const div = document.getElementById('overHistory');
  if (!div) return;
  const overKeys = Object.keys(overs).sort((a, b) => b - a).slice(0, 5);
  div.innerHTML = overKeys.map(ov => {
    const ovBalls = overs[ov];
    const overRuns = ovBalls.reduce((s, b) => s + b.runs + b.wide + b.noball + b.bye + b.legbye, 0);
    const overWkts = ovBalls.filter(b => b.wicket).length;
    return `<div class="over-group">
      <div class="over-label">Over ${parseInt(ov) + 1}</div>
      <div class="ball-seq">${ovBalls.map(b => {
        const v = b.wicket ? 'W' : b.wide ? 'Wd' : b.noball ? 'Nb' : String(b.runs);
        const cls = b.wicket ? 'W' : b.wide ? 'Wd' : b.noball ? 'Nb' : String(Math.min(b.runs, 6));
        return `<div class="ball ball-${cls}" title="${b.wicket ? b.wicketType : ''}">${v}</div>`;
      }).join('')}</div>
      <div class="over-runs">${overRuns} runs${overWkts ? ', ' + overWkts + ' wkt' + (overWkts > 1 ? 's' : '') : ''}</div>
    </div>`;
  }).join('');
}

function renderLiveScorecards() {
  const mId = document.getElementById('bb_match')?.value;
  const innings = parseInt(document.getElementById('bb_innings')?.value);
  if (!mId || !innings) return;
  const balls = DB.balls.filter(b => b.matchId == mId && b.innings == innings);

  // Batting stats
  const batStats = {};
  balls.forEach(b => {
    if (!batStats[b.strikerId]) batStats[b.strikerId] = { runs:0, balls:0, fours:0, sixes:0, out:false, howOut:'' };
    const bs = batStats[b.strikerId];
    if (!b.wide) { bs.balls++; bs.runs += b.runs; bs.fours += b.four; bs.sixes += b.six; }
    if (b.wicket) { bs.out = true; bs.howOut = b.wicketType + (b.fielderId ? ' b ' + getPlayerName(b.fielderId) : ''); }
  });

  const bBody = document.getElementById('battingBody');
  if (bBody) {
    const activeBatters = [
      parseInt(document.getElementById('bb_striker')?.value),
      parseInt(document.getElementById('bb_nonstriker')?.value)
    ];
    bBody.innerHTML = Object.entries(batStats).map(([pid, st]) => {
      const isOn = activeBatters.includes(parseInt(pid));
      const sr = st.balls > 0 ? ((st.runs / st.balls) * 100).toFixed(1) : '0.0';
      return `<tr class="${st.out ? 'out' : isOn ? 'batting' : ''}">
        <td><div class="name-cell">
          ${isOn ? '<span class="badge-bat">●</span>' : ''}
          ${getPlayerName(parseInt(pid))}
          ${st.out ? '<small style="color:var(--text3);font-size:10px"> c/b ' + st.howOut + '</small>' : ''}
        </div></td>
        <td><b>${st.runs}</b></td><td>${st.balls}</td>
        <td>${st.fours}</td><td>${st.sixes}</td>
        <td class="sr">${sr}</td>
      </tr>`;
    }).join('');
  }

  // Bowling stats
  const bowlStats = {};
  balls.forEach(b => {
    if (!bowlStats[b.bowlerId]) bowlStats[b.bowlerId] = { balls:0, runs:0, wickets:0, maidens:0, _overRuns:{} };
    const bs = bowlStats[b.bowlerId];
    if (!b.wide && !b.noball) bs.balls++;
    bs.runs += b.runs + b.wide + b.noball;
    if (b.wicket) bs.wickets++;
    // Track per-over for maiden calc
    if (!bs._overRuns[b.over]) bs._overRuns[b.over] = 0;
    bs._overRuns[b.over] += b.runs + b.wide;
  });
  Object.values(bowlStats).forEach(bs => {
    bs.maidens = Object.values(bs._overRuns).filter(r => r === 0 && bs.balls >= 6).length;
    bs.overs = Math.floor(bs.balls / 6) + '.' + (bs.balls % 6);
    bs.econ = bs.balls > 0 ? (bs.runs / (bs.balls / 6)).toFixed(2) : '0.00';
  });

  const bowlBody = document.getElementById('bowlingBody');
  if (bowlBody) {
    bowlBody.innerHTML = Object.entries(bowlStats).map(([pid, st]) => `
      <tr>
        <td>${getPlayerName(parseInt(pid))}</td>
        <td>${st.overs}</td><td>${st.maidens}</td>
        <td>${st.runs}</td><td><b>${st.wickets}</b></td>
        <td class="sr">${st.econ}</td>
      </tr>`).join('');
  }

  // Update live sidebar
  updateLiveSidebar(mId, innings, balls, batStats);
}

function updateLiveSidebar(mId, innings, balls, batStats) {
  const sc = getMatchScore(mId, innings);
  const match = DB.matches.find(m => m.id == mId);
  if (!sc || !match) return;
  const tourn2 = DB.tournaments.find(t => t.id == match.tournamentId);
  const tType2 = tourn2?.type || 'T20';
  const isSO2 = innings >= 3;
  const maxOvers2 = isSO2 ? 1 : tType2==='T10'?10 : tType2==='ODI'?50 : 20;
  const batTeam = parseInt(document.getElementById('bb_bat_team')?.value);
  const crr = sc.totalBalls > 0 ? (sc.runs / (sc.totalBalls / 6)).toFixed(2) : '0.00';
  const activeBatters = [
    parseInt(document.getElementById('bb_striker')?.value),
    parseInt(document.getElementById('bb_nonstriker')?.value)
  ];
  const striker = activeBatters[0];
  const strikSt = batStats[striker] || {runs:0, balls:0};
  document.getElementById('liveSidebar').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="font-family:var(--font-cond);font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:4px">${innings === 1 ? '1ST' : '2ND'} INNINGS</div>
      <div style="font-family:var(--font-cond);font-size:11px;color:var(--text3)">${getTeamName(batTeam)}</div>
      <div style="font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--text);line-height:1">${sc.runs}<span style="font-size:20px;color:var(--text3)">/${sc.wickets}</span></div>
      <div style="font-family:var(--font-cond);font-size:13px;color:var(--text3)">${sc.overs} overs • CRR ${crr}</div>
    </div>
    ${innings >= 2 ? (() => {
      const refInn = innings===4?3:1;
      const sc1 = getMatchScore(mId, refInn);
      if (!sc1) return '';
      const target = sc1.runs + 1;
      const runsNeeded = Math.max(0, target - sc.runs);
      const ballsLeft = Math.max(0, (maxOvers2*6) - sc.totalBalls);
      const rrr = ballsLeft>0?(runsNeeded/(ballsLeft/6)).toFixed(2):'—';
      const crr = sc.totalBalls>0?(sc.runs/(sc.totalBalls/6)).toFixed(2):'0.00';
      const rrrColor = parseFloat(rrr)>parseFloat(crr)?'#ff4455':'#00cc66';
      if (runsNeeded<=0) return `<div style="background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-family:var(--font-cond);font-size:13px;font-weight:700;color:var(--accent3)">🏆 Won!</div>`;
      return `<div style="background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-family:var(--font-cond);font-size:11px">
        <div style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px">Target: ${target}</div>
        <div style="color:var(--text2);margin-bottom:3px">Need <b style="color:var(--text)">${runsNeeded}</b> runs off <b style="color:var(--text)">${ballsLeft}</b> balls</div>
        <div style="display:flex;gap:14px">
          <span style="color:var(--text3)">RRR: <b style="color:${rrrColor}">${rrr}</b></span>
          <span style="color:var(--text3)">CRR: <b style="color:var(--accent)">${crr}</b></span>
        </div>
      </div>`;
    })() : ''}
    <div style="margin-bottom:8px">
      ${activeBatters.filter(Boolean).map((pid, i) => {
        const st = batStats[pid] || {runs:0, balls:0};
        const sr = st.balls > 0 ? ((st.runs / st.balls)*100).toFixed(0) : '0';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:12px;font-family:var(--font-cond)">${i===0?'🏏 ':''}<b style="color:var(--text)">${getPlayerName(pid)}</b></div>
          <div style="font-family:var(--font-mono);font-size:12px;color:var(--accent)">${st.runs}(${st.balls})</div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--font-cond);letter-spacing:1px;margin-bottom:4px">LAST 5 BALLS</div>
    <div class="ball-seq">${balls.slice(-5).map(b => {
      const v = b.wicket?'W':b.wide?'Wd':b.noball?'Nb':String(b.runs);
      return `<div class="ball ball-${b.wicket?'W':b.wide?'Wd':b.noball?'Nb':String(Math.min(b.runs,6))}" style="width:28px;height:28px;font-size:10px">${v}</div>`;
    }).join('')}</div>`;
}

// ── POINTS TABLE ──────────────────────────────────────────
function renderPointsTable() {
  const tId = document.getElementById('pt_tournament')?.value;
  const div = document.getElementById('pointsTableDisplay');
  if (!div || !tId) return;
  const teams = DB.teams.filter(t => t.tournamentId == tId);
  const matches = DB.matches.filter(m => m.tournamentId == tId);
  const pts = teams.map(t => {
    const tMatches = matches.filter(m => m.team1 === t.id || m.team2 === t.id);
    let p=0, w=0, l=0, nr=0, pts2=0, nrr=0, runsFor=0, runsAgainst=0, ballsFor=0, ballsAgainst=0;
    tMatches.forEach(m => {
      const sc1 = getMatchScore(m.id, 1), sc2 = getMatchScore(m.id, 2);
      if (!sc1 || !sc2) return;
      p++;
      const isBat1 = m.team1 === t.id;
      const myRuns = isBat1 ? sc1.runs : sc2.runs;
      const oppRuns = isBat1 ? sc2.runs : sc1.runs;
      const myBalls = isBat1 ? sc1.totalBalls : sc2.totalBalls;
      const oppBalls = isBat1 ? sc2.totalBalls : sc1.totalBalls;
      runsFor += myRuns; runsAgainst += oppRuns;
      ballsFor += myBalls || 120; ballsAgainst += oppBalls || 120;
      if (myRuns > oppRuns) { w++; pts2 += 2; }
      else if (myRuns === oppRuns) { nr++; pts2 += 1; }
      else l++;
    });
    nrr = ballsFor > 0 && ballsAgainst > 0 ? ((runsFor / (ballsFor/6)) - (runsAgainst / (ballsAgainst/6))).toFixed(3) : '0.000';
    return { ...t, p, w, l, nr, pts: pts2, nrr };
  }).sort((a, b) => b.pts - a.pts || parseFloat(b.nrr) - parseFloat(a.nrr));

  div.innerHTML = `
    <div class="card" style="padding:0;overflow:hidden;margin-top:12px">
      <table class="bat-table" style="width:100%">
        <thead>
          <tr style="background:var(--bg4)">
            <th style="text-align:left;padding:10px 12px">#</th>
            <th style="text-align:left;padding:10px 12px">Team</th>
            <th>P</th><th>W</th><th>L</th><th>NR</th>
            <th style="color:var(--accent4)">Pts</th><th>NRR</th>
          </tr>
        </thead>
        <tbody>
          ${pts.map((t, i) => `<tr style="${i < 4 ? 'background:rgba(0,212,255,.03)' : ''}">
            <td style="text-align:left;padding:8px 12px;color:var(--text3)">${i+1}</td>
            <td style="text-align:left;padding:8px 12px">
              <div style="display:flex;align-items:center;gap:8px">
                <div style="width:24px;height:24px;border-radius:6px;background:${t.jersey};display:inline-block;flex-shrink:0"></div>
                <b>${t.name}</b>
              </div>
            </td>
            <td>${t.p}</td><td style="color:var(--green)">${t.w}</td>
            <td style="color:var(--red)">${t.l}</td><td>${t.nr}</td>
            <td style="color:var(--accent4);font-weight:700">${t.pts}</td>
            <td style="font-family:var(--font-mono);font-size:11px;color:${parseFloat(t.nrr)>=0?'var(--green)':'var(--red)'}">${t.nrr}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}
